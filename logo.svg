<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900');</style>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="1" height="4">
      <rect width="1" height="4" fill="transparent"/>
      <rect y="3" width="1" height="1" fill="rgba(0,0,0,0.06)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" fill="#060a0f"/>

  <!-- Scanlines -->
  <rect width="120" height="120" fill="url(#scanlines)"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="119" height="119" fill="none" stroke="#1a2a3a" stroke-width="1"/>
  <!-- Blue glow on border -->
  <rect x="1" y="1" width="118" height="118" fill="none" stroke="rgba(74,158,255,0.12)" stroke-width="2"/>

  <!-- Small circle outline in center background -->
  <circle cx="60" cy="60" r="36" fill="none" stroke="#4a9eff" stroke-width="0.5" opacity="0.08"/>

  <!-- Decorative tick lines -->
  <line x1="18" y1="44" x2="28" y2="44" stroke="#4a9eff" stroke-width="0.5" opacity="0.15"/>
  <line x1="92" y1="44" x2="102" y2="44" stroke="#4a9eff" stroke-width="0.5" opacity="0.15"/>
  <line x1="18" y1="76" x2="28" y2="76" stroke="#4a9eff" stroke-width="0.5" opacity="0.15"/>

  <!-- Soft glow behind N -->
  <circle cx="60" cy="60" r="40" fill="rgba(74,158,255,0.06)"/>

  <!-- Corner HUD brackets -->
  <path d="M4,13 L4,4 L13,4" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="square" opacity="0.6"/>
  <path d="M107,4 L116,4 L116,13" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="square" opacity="0.6"/>
  <path d="M4,107 L4,116 L13,116" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="square" opacity="0.6"/>
  <path d="M116,107 L116,116 L107,116" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="square" opacity="0.6"/>

  <!-- Soft glow behind N -->
  <circle cx="60" cy="60" r="40" fill="rgba(74,158,255,0.06)"/>

  <!-- Large N -->
  <text
    x="60" y="60"
    font-family="'Orbitron', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="72"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="central"
  >N</text>
</svg>
