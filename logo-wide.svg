<svg xmlns="http://www.w3.org/2000/svg" width="300" height="80" viewBox="0 0 300 80">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900');</style>
    <pattern id="scanlines-wide" patternUnits="userSpaceOnUse" width="1" height="4">
      <rect width="1" height="4" fill="transparent"/>
      <rect y="3" width="1" height="1" fill="rgba(0,0,0,0.06)"/>
    </pattern>
  </defs>

  <!-- Wide background -->
  <rect width="300" height="80" fill="#060a0f"/>

  <!-- ═══ ICON (50x50 centered in 80px height, left-aligned) ═══ -->
  <g transform="translate(15, 15)">
    <!-- Icon background -->
    <rect width="50" height="50" fill="#060a0f"/>
    <!-- Scanlines on icon -->
    <rect width="50" height="50" fill="url(#scanlines-wide)"/>
    <!-- Icon border -->
    <rect x="0.5" y="0.5" width="49" height="49" fill="none" stroke="#1a2a3a" stroke-width="1"/>
    <rect x="1" y="1" width="48" height="48" fill="none" stroke="rgba(74,158,255,0.12)" stroke-width="1.5"/>
    <!-- Circle outline -->
    <circle cx="25" cy="25" r="15" fill="none" stroke="#4a9eff" stroke-width="0.5" opacity="0.08"/>
    <!-- Soft glow -->
    <circle cx="25" cy="25" r="18" fill="rgba(74,158,255,0.06)"/>
    <!-- Corner brackets -->
    <path d="M2,6 L2,2 L6,2" fill="none" stroke="#4a9eff" stroke-width="1" stroke-linecap="square" opacity="0.6"/>
    <path d="M44,2 L48,2 L48,6" fill="none" stroke="#4a9eff" stroke-width="1" stroke-linecap="square" opacity="0.6"/>
    <path d="M2,44 L2,48 L6,48" fill="none" stroke="#4a9eff" stroke-width="1" stroke-linecap="square" opacity="0.6"/>
    <path d="M48,44 L48,48 L44,48" fill="none" stroke="#4a9eff" stroke-width="1" stroke-linecap="square" opacity="0.6"/>
    <!-- Tick lines -->
    <line x1="4" y1="18" x2="9" y2="18" stroke="#4a9eff" stroke-width="0.5" opacity="0.15"/>
    <line x1="41" y1="18" x2="46" y2="18" stroke="#4a9eff" stroke-width="0.5" opacity="0.15"/>
    <!-- N letter -->
    <text
      x="25" y="25"
      font-family="'Orbitron', 'Arial Black', sans-serif"
      font-weight="900"
      font-size="30"
      fill="#ffffff"
      text-anchor="middle"
      dominant-baseline="central"
    >N</text>
  </g>

  <!-- ═══ WORDMARK ═══ -->
  <!-- NOTAM -->
  <text
    x="78" y="34"
    font-family="'Orbitron', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="3"
    fill="#ffffff"
    dominant-baseline="auto"
  >NOTAM</text>
  <!-- INTELLIGENCE -->
  <text
    x="78" y="58"
    font-family="'Orbitron', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="13"
    letter-spacing="3"
    fill="#4a9eff"
    dominant-baseline="auto"
  >INTELLIGENCE</text>
</svg>
